<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miampic</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="popup-logo">
        <div class="popup-logo-icon">
          <svg viewBox="0 0 128 128" width="32" height="32">
            <defs>
              <linearGradient id="catGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#B8A9E8"/>
                <stop offset="50%" style="stop-color:#A8D8B8"/>
                <stop offset="100%" style="stop-color:#F5E6B8"/>
              </linearGradient>
            </defs>
            <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#catGrad)"/>
            <g fill="#5D5A6E">
              <ellipse cx="62" cy="98" rx="24" ry="20"/>
              <path d="M 85 95 Q 98 88, 102 75 Q 105 65, 102 58 Q 100 54, 97 56 Q 94 60, 94 68 Q 94 80, 82 92 Z" fill="#5D5A6E"/>
              <ellipse cx="62" cy="58" rx="32" ry="28"/>
              <polygon points="36,32 46,58 26,50"/>
              <polygon points="88,32 78,58 98,50"/>
              <ellipse cx="50" cy="54" rx="6" ry="7" fill="#FFF"/>
              <ellipse cx="74" cy="54" rx="6" ry="7" fill="#FFF"/>
              <circle cx="51" cy="55" r="3.5" fill="#3D3A4E"/>
              <circle cx="75" cy="55" r="3.5" fill="#3D3A4E"/>
              <ellipse cx="62" cy="66" rx="4" ry="2.5" fill="#E8A0B0"/>
            </g>
          </svg>
        </div>
        <span class="popup-logo-text">Miampic</span>
      </div>
      <button class="popup-settings-btn" id="settingsBtn" title="设置">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <!-- API Warning -->
    <div class="popup-api-warning" id="apiWarning" style="display: none;">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#E8A0A0" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <p>请先配置 API Key</p>
      <button class="popup-setup-btn" id="setupBtn">去设置</button>
    </div>

    <!-- Main Actions -->
    <div class="popup-main-actions" id="mainActions">
      <!-- 提示词用途选择 - 标签和下拉框并排 -->
      <div class="popup-mode-row">
        <span class="popup-mode-label">提示词用途</span>
        <select id="modeSelect" class="popup-mode-select">
          <option value="generate">直接生图</option>
          <option value="assist">辅助改图</option>
        </select>
      </div>
      
      <div class="popup-actions">
        <button class="popup-action-btn" id="screenshotBtn">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
            <circle cx="12" cy="13" r="4"></circle>
          </svg>
          <span>截图分析</span>
        </button>
        <button class="popup-action-btn" id="uploadBtn">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          <span>上传图片</span>
        </button>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display: none;">
      
      <!-- 右键提示 -->
      <p class="popup-hint">* 右键图片可直接生成提示词</p>
    </div>

    <!-- Footer -->
    <footer class="popup-footer">
      <span class="popup-version">
        V1.0.0 @Prune
        <svg class="popup-paw-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="12" cy="16" rx="4.5" ry="3.5" fill="currentColor"/>
          <ellipse cx="6" cy="10.5" rx="1.8" ry="2.3" fill="currentColor"/>
          <ellipse cx="18" cy="10.5" rx="1.8" ry="2.3" fill="currentColor"/>
          <ellipse cx="9.5" cy="6" rx="2.2" ry="2.7" fill="currentColor"/>
          <ellipse cx="14.5" cy="6" rx="2.2" ry="2.7" fill="currentColor"/>
        </svg>
      </span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
